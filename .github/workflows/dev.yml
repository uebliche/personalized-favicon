name: Development Build

on:
  pull_request:
    branches: [ "master" ]
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v7

    - name: Setup Java 21 Zulu
      uses: actions/setup-java@v5
      with:
        java-version: "21"
        distribution: "zulu"

    - name: Add Gralew permissions
      run: chmod +x gradlew

    - name: Build
      run: ./gradlew clean shadowJar
    - name: Latest
      uses: anton-yurchenko/git-release@main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        UNRELEASED: "update"
        UNRELEASED_TAG: "dev"
      with:
        args: build/libs/*.jar